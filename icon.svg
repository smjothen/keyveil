<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2A6E"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="veil" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.45"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Row 1 (top) — 6 keys -->
  <rect x="58"  y="148" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="134" y="148" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="210" y="148" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="286" y="148" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="362" y="148" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="438" y="148" width="16" height="56" rx="8" fill="url(#key)"/>
  <!-- Row 2 (middle) — wider first key + 4 keys -->
  <rect x="58"  y="224" width="88" height="56" rx="8" fill="url(#key)"/>
  <rect x="158" y="224" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="234" y="224" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="310" y="224" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="386" y="224" width="68" height="56" rx="8" fill="url(#key)"/>
  <!-- Row 3 (bottom) — key + spacebar + key -->
  <rect x="58"  y="300" width="64" height="56" rx="8" fill="url(#key)"/>
  <rect x="134" y="300" width="220" height="56" rx="8" fill="url(#key)"/>
  <rect x="366" y="300" width="88" height="56" rx="8" fill="url(#key)"/>
  <!-- Veil overlay -->
  <rect width="512" height="512" rx="80" fill="url(#veil)"/>
</svg>
